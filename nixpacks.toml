[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm install -g pnpm@10", "pnpm install --no-frozen-lockfile"]

[phases.build]
cmds = [
  "pnpm --filter @workspace/dominium run build",
  "pnpm --filter @workspace/api-server run build"
]

[start]
cmd = "node --enable-source-maps artifacts/api-server/dist/index.mjs"
